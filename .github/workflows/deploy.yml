name: Deploy

on:
  # main 分支有新提交时自动部署，也支持手动触发。
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # 同一时间只保留一个生产部署，新的部署会取消旧的进行中任务。
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          # 任一步骤失败时立即终止，避免带故障继续往下执行。
          script_stop: true
          script: |
            set -e
            cd /opt/48messages

            get_viewer_total_messages() {
              for _ in 1 2 3 4 5; do
                if ACTUAL_COUNT=$(curl -fsS http://127.0.0.1:8000/stats-summary | python3 -c "import json,sys; print(json.load(sys.stdin).get('total_messages', ''))"); then
                  return 0
                fi
                systemctl --no-pager --full status 48messages-viewer || true
                sleep 2
              done
              return 1
            }

            # 记录部署前版本，后面只在 requirements.txt 变更时安装依赖。
            OLD_HEAD=$(git rev-parse HEAD)
            git pull --ff-only origin main
            if ! git diff --quiet "$OLD_HEAD" HEAD -- requirements.txt; then
              /opt/48messages-venv/bin/pip install -r requirements.txt
            fi

            # 先停掉抓取服务，避免校验 viewer 时数据库仍在继续写入。
            systemctl stop 48messages-scraper
            systemctl restart 48messages-viewer
            systemctl is-active 48messages-viewer

            # 先确认本机 Nginx 首页可访问。
            curl -fsS http://127.0.0.1/ > /dev/null

            # 用服务器本地 Python 直接查数据库，得到“成员 TEXT 消息总数”的真实值。
            EXPECTED_COUNT=$(cd /opt/48messages && PYTHONPATH=src /opt/48messages-venv/bin/python -c "from pocket48_scraper import load_config; from message_storage import create_storage; config = load_config('config/config.json'); storage = create_storage(config); print(storage.search_messages(sender_role='member', msg_type='TEXT', limit=1, offset=0)['total'])")

            # 从稳定的 JSON 统计接口读取“总消息数”，并等待 viewer 完成重启。
            get_viewer_total_messages
            if [ "$ACTUAL_COUNT" != "$EXPECTED_COUNT" ]; then
              echo "viewer count mismatch after restart: api=$ACTUAL_COUNT expected=$EXPECTED_COUNT"

              # viewer 刚重启时偶发读到旧响应，先重启再重试一次。
              systemctl restart 48messages-viewer
              sleep 2
              get_viewer_total_messages
            fi

            # 二次校验仍不一致时直接让部署失败，避免带着错误页面上线。
            if [ "$ACTUAL_COUNT" != "$EXPECTED_COUNT" ]; then
              echo "viewer count mismatch persists: api=$ACTUAL_COUNT expected=$EXPECTED_COUNT"
              exit 1
            fi

            # viewer 校验通过后再启动抓取服务，避免部署期间漏抓太久。
            systemctl start 48messages-scraper
            systemctl is-active 48messages-scraper
