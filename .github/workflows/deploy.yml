name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd /opt/48messages
            OLD_HEAD=$(git rev-parse HEAD)
            git pull --ff-only origin main
            if ! git diff --quiet "$OLD_HEAD" HEAD -- requirements.txt; then
              /opt/48messages-venv/bin/pip install -r requirements.txt
            fi
            systemctl restart 48messages-scraper
            systemctl restart 48messages-viewer
            systemctl is-active 48messages-scraper
            systemctl is-active 48messages-viewer
            curl -fsS http://127.0.0.1/ > /dev/null
            EXPECTED_COUNT=$(
              cd /opt/48messages && PYTHONPATH=src /opt/48messages-venv/bin/python -c '
from pocket48_scraper import load_config
from message_storage import create_storage

config = load_config("config/config.json")
storage = create_storage(config)
print(storage.search_messages(sender_role="member", msg_type="TEXT", limit=1, offset=0)["total"])
'
            )
            ACTUAL_COUNT=$(curl -fsS http://127.0.0.1/ | grep -o 'TEXT 消息总数</div><div class="value">[0-9]\+</div>' | grep -o '[0-9]\+')
            if [ "$ACTUAL_COUNT" != "$EXPECTED_COUNT" ]; then
              echo "viewer count mismatch after restart: page=$ACTUAL_COUNT expected=$EXPECTED_COUNT"
              systemctl restart 48messages-viewer
              sleep 2
              ACTUAL_COUNT=$(curl -fsS http://127.0.0.1/ | grep -o 'TEXT 消息总数</div><div class="value">[0-9]\+</div>' | grep -o '[0-9]\+')
            fi
            if [ "$ACTUAL_COUNT" != "$EXPECTED_COUNT" ]; then
              echo "viewer count mismatch persists: page=$ACTUAL_COUNT expected=$EXPECTED_COUNT"
              exit 1
            fi
